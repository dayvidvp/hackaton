<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helpdesk AI — Aanmelden</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <script>
    (function () {
      const t = localStorage.getItem('theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg-base:         #0f1117;
      --bg-surface:      #161b27;
      --bg-surface-2:    #1e2535;
      --bg-surface-3:    #1a2030;
      --border:          #1e2535;
      --border-2:        #2d3748;
      --text-primary:    #f1f5f9;
      --text-secondary:  #e2e8f0;
      --text-muted:      #cbd5e1;
      --text-subtle:     #94a3b8;
      --text-faint:      #64748b;
      --shadow-modal:    0 20px 60px rgba(0,0,0,0.5);
    }

    [data-theme="light"] {
      --bg-base:         #f1f5f9;
      --bg-surface:      #ffffff;
      --bg-surface-2:    #f1f5f9;
      --bg-surface-3:    #e8edf5;
      --border:          #e2e8f0;
      --border-2:        #cbd5e1;
      --text-primary:    #0f172a;
      --text-secondary:  #1e293b;
      --text-muted:      #334155;
      --text-subtle:     #475569;
      --text-faint:      #94a3b8;
      --shadow-modal:    0 20px 60px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-secondary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 420px;
      max-width: 95vw;
      box-shadow: var(--shadow-modal);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo img { width: 48px; height: 48px; border-radius: 10px; }
    .logo h1 { font-size: 1.2rem; font-weight: 600; color: var(--text-primary); }

    h2 { font-size: 0.95rem; color: var(--text-subtle); margin-bottom: 18px; font-weight: 400; }

    .user-list {
      display: flex; flex-direction: column; gap: 6px; max-height: 380px; overflow-y: auto;
    }
    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    .user-btn {
      text-align: left;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      background: var(--bg-base);
      font-family: inherit;
      width: 100%;
      transition: all 0.15s;
    }
    .user-btn:hover { background: var(--bg-surface-3); border-color: #6366f1; }
    .user-btn strong { font-size: 0.9rem; color: var(--text-secondary); display: block; }
    .user-meta { font-size: 0.76rem; color: var(--text-faint); margin-top: 3px; }

    .role-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .role-dot.admin   { background: #818cf8; }
    .role-dot.beperkt { background: #fb923c; }

    .theme-toggle-btn {
      position: fixed;
      top: 16px; right: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-2);
      color: var(--text-subtle);
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .theme-toggle-btn:hover { background: var(--bg-surface-3); color: var(--text-muted); }
  </style>
</head>
<body>
  <button class="theme-toggle-btn" onclick="toggleTheme()" title="Schakel thema"></button>

  <div class="card">
    <div class="logo">
      <img src="/static/logo.svg" alt="Helpdesk AI">
      <h1>Helpdesk AI</h1>
    </div>
    <h2>Wie ben jij?</h2>
    <div class="user-list">
      {% for u in all_users %}
      <button class="user-btn" onclick="login('{{ u.email }}')">
        <strong>{{ u.display_name }}</strong>
        <div class="user-meta">
          <span class="role-dot {{ u.role }}"></span>
          {{ u.email }}
        </div>
      </button>
      {% endfor %}
    </div>
  </div>

  <script>
    function login(email) {
      fetch('/do-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      }).then(r => r.json()).then(d => { if (d.ok) location.href = '/'; });
    }
  </script>
  <script src="/static/theme.js"></script>
</body>
</html>
